[package]
name = "duvis"
version = "0.1.0"
edition = "2021"
description = "Disk usage visualizer for both AI and humans"
repository = "https://github.com/yamadashy/duvis"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
