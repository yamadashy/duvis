name: cargo-publish

# Publishes to crates.io via Trusted Publishing — no API token stored in
# repo secrets. crates.io is configured with this repo + workflow filename
# as a trusted publisher and hands us a short-lived token at runtime via
# OIDC. See https://crates.io/docs/trusted-publishing for the dashboard
# setup.

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run in dry-run mode (no actual publish)'
        required: false
        default: false
        type: boolean

permissions:
  # `gh release create` needs to write a tag + GitHub Release.
  contents: write
  # Required so GitHub mints an OIDC token that crates.io can verify.
  id-token: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js (for UI bundle)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Check if version already published
        shell: bash
        run: |
          VERSION=$(awk -F'"' '/^version =/ { print $2; exit }' Cargo.toml)
          if [[ -z "$VERSION" ]]; then
            echo "::error::could not detect version in Cargo.toml"
            exit 1
          fi
          echo "Cargo.toml version: $VERSION"
          # `cargo search` returns the latest published version. Compare
          # exactly so we don't false-positive on substring matches
          # (e.g. 0.1.10 matching 0.1.1).
          PUBLISHED=$(cargo search duvis --limit 1 | awk -F'"' '/^duvis = / { print $2; exit }')
          echo "crates.io latest:    ${PUBLISHED:-<none>}"
          if [[ "$PUBLISHED" == "$VERSION" ]]; then
            echo "::error::duvis ${VERSION} is already on crates.io"
            exit 1
          fi

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: UI typecheck
        working-directory: ui
        run: |
          npm ci
          npm run typecheck

      - name: Build prebuilt UI bundle
        # `cargo publish` includes prebuilt/ui.html via Cargo.toml's
        # `include` list, so it has to exist before packaging. The file is
        # gitignored (we don't want a 200KB blob diff per UI change), which
        # is also why the publish step needs --allow-dirty.
        run: |
          cd ui && npm run build:prebuilt

      - name: Authenticate to crates.io (Trusted Publishing)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish (dry-run)
        if: ${{ inputs.dry-run }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --dry-run --allow-dirty

      - name: Publish
        if: ${{ !inputs.dry-run }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --allow-dirty

      - name: Tag the release
        if: ${{ !inputs.dry-run }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(awk -F'"' '/^version =/ { print $2; exit }' Cargo.toml)
          gh release create "v${VERSION}" --generate-notes --target "${{ github.sha }}"
