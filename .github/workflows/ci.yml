name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  ui-typecheck:
    name: UI typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  layering:
    name: Layering invariants
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: serde derives confined to src/wire/
        # Domain types in entry / category / scanner deliberately do
        # not derive (or hand-implement) serde traits — the on-wire
        # format is defined exclusively under src/wire/. A
        # `#[derive(Serialize)]` or `impl Serialize for …` outside
        # wire/ would silently couple the wire schema to a domain
        # refactor, which is exactly what this layer split prevents.
        run: |
          set -euo pipefail
          violations=$(
            grep -rnE \
              'derive\([^)]*(Serialize|Deserialize)|impl[[:space:]]+(<[^>]*>[[:space:]]+)?(Serialize|Deserialize)[[:space:]]+for' \
              src/ --include='*.rs' \
            | grep -vE '^src/wire(/|\.rs)' \
            || true
          )
          if [[ -n "$violations" ]]; then
            echo "::error::serde derive / impl found outside src/wire/:"
            echo "$violations"
            exit 1
          fi
      - name: axum confined to src/ui.rs
        # `axum` is the HTTP framework used only by the --ui server.
        # Pulling it into core / cli / output would couple the
        # library half of the crate to a heavy async dep — the
        # split is what lets `duvis --json` stay a fast synchronous
        # path.
        run: |
          set -euo pipefail
          violations=$(
            grep -rnE '\baxum::|^use[[:space:]]+axum\b' src/ --include='*.rs' \
            | grep -vE '^src/ui(/|\.rs)' \
            || true
          )
          if [[ -n "$violations" ]]; then
            echo "::error::axum used outside src/ui.rs:"
            echo "$violations"
            exit 1
          fi
      - name: tokio confined to UI server + cli dispatcher
        # `tokio` is only needed where we actually run async code:
        # the UI server (src/ui.rs) and the cli dispatch path that
        # block_on's it (src/cli/app.rs). Output writers and the
        # scanner stay sync.
        run: |
          set -euo pipefail
          violations=$(
            grep -rnE '\btokio::|^use[[:space:]]+tokio\b' src/ --include='*.rs' \
            | grep -vE '^src/ui(/|\.rs)|^src/cli/app\.rs' \
            || true
          )
          if [[ -n "$violations" ]]; then
            echo "::error::tokio used outside src/ui.rs and src/cli/app.rs:"
            echo "$violations"
            exit 1
          fi
      - name: clap confined to src/cli/
        # clap derives + types belong in the cli layer. Domain code
        # mustn't import clap so that the library half of the crate
        # can be driven without a clap-parsed Cli (integration tests
        # construct `RunPlan` directly).
        #
        # Looking for `use clap` (imports) and `#[clap(` /
        # `#[derive(.. clap::Parser ..)]`-style attributes rather
        # than any mention of `clap::`, so comments referencing the
        # historical clap behaviour don't trip the check.
        run: |
          set -euo pipefail
          violations=$(
            grep -rnE '^[[:space:]]*(use[[:space:]]+clap\b|#\[(derive\([^)]*clap|clap\())' \
              src/ --include='*.rs' \
            | grep -vE '^src/cli(/|\.rs)' \
            || true
          )
          if [[ -n "$violations" ]]; then
            echo "::error::clap used outside src/cli/:"
            echo "$violations"
            exit 1
          fi

  fmt:
    name: Format (rustfmt)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Lint (clippy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --verbose
      - run: cargo test --verbose
      - run: cargo run --release -- --help

  test-no-ui:
    # `ui` is a default feature. This job proves the crate still builds
    # and tests cleanly with the UI server stripped — axum / tokio / open
    # are gated behind `--no-default-features`, so a downstream consumer
    # (or any future library-only use) can compile without that surface.
    name: Test (--no-default-features)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --no-default-features --verbose
      - run: cargo test --no-default-features --verbose
      - run: cargo clippy --no-default-features --all-targets -- -D warnings

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
